<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Analizi</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            font-size: 13px;
            overflow-x: hidden;
            line-height: 1.6;
        }
        .line {
            margin-bottom: 6px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div id="terminal"></div>

    <script>
        const lines = [
            "Initializing deep system core diagnostics...",
            "Connecting to primary proxy server at 192.168.1.99...",
            "Establishing secure handshake via SSL TLS 1.3...",
            "Connection stable. Latency: 12ms.",
            "Bypassing internal security layers...",
            "Injecting payload into local runtime environment...",
            "Access Granted. Root privileges successfully obtained.",
            "--------------------------------------------------",
            "SCANNING SYSTEM DIRECTORIES & MEMORY LEAKS",
            "--------------------------------------------------",
            "Scanning /root/sys/kernel/modules...",
            "Scanning /etc/security/limits.conf...",
            "Scanning local user database files...",
            "Extracting system metadata and active hardware logs...",
            "Optimizing CPU thread allocations for extraction...",
            "WARNING: 3 unencrypted data packets detected in memory.",
            "Isolating suspicious background processes...",
            "Dumping volatile system registry files...",
            "Checking local network interface status (eth0)...",
            "Analyzing active socket connections on port 443...",
            "--------------------------------------------------",
            "HARDWARE & INFRASTRUCTURE DIAGNOSTICS",
            "--------------------------------------------------",
            "Fetching GPU core temperature and clock speeds...",
            "Analyzing NVMe SSD write/read cycles...",
            "Checking memory sector consistency (RAM Block A-D)...",
            "Parsing hardware identification numbers (HWID)...",
            "Verifying BIOS firmware signature authenticity...",
            "Mapping local dynamic link libraries (.dll modules)...",
            "Tracing network routing hops to main server...",
            "Analyzing filesystem encryption status (AES-256)...",
            "Clearing system cache buffers to prevent tracking...",
            "Generating comprehensive diagnostic crash report...",
            "--------------------------------------------------",
            "SECURITY OVERRIDE & FINAL DEPLOYMENT",
            "--------------------------------------------------",
            "Overriding default system administrator policies...",
            "Establishing persistent backdoor link...",
            "Syncing local database logs with remote server...",
            "Uploading system configuration profiles...",
            "Encapsulating secure connection packets...",
            "Removing temporary execution tracks and logs...",
            "Finalizing diagnostic subroutines...",
            "...",
            "SYSTEM ANALYSIS COMPLETE. PROTOCOL 404 DEPLOYED.",
            "ALL TARGET DATA TERMINAL STABLE. AWAITING REMOTE COMMAND..."
        ];

        const terminal = document.getElementById("terminal");
        let i = 0;

        function printLine() {
            if (i < lines.length) {
                let div = document.createElement("div");
                div.className = "line";
                div.innerText = "> " + lines[i];
                terminal.appendChild(div);
                
                // Ekranın otomatik olarak en aşağı kaymasını sağlar
                window.scrollTo(0, document.body.scrollHeight);
                
                i++;
                // Satırların geliş hızını hafifçe düşürdüm ki okumaya çalışırken panik artsın (350 milisaniye)
                setTimeout(printLine, 350); 
            }
        }

        // Başlat
        printLine();
    </script>

</body>
</html>
