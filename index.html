<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Analizi</title>

<style>
body{
    background:#000;
    color:#00ff00;
    font-family:Consolas, monospace;
    margin:0;
    padding:20px;
}

#terminal{
    white-space:pre-wrap;
    line-height:1.5;
}

#sonuc{
    display:none;
    text-align:center;
    margin-top:50px;
    font-size:32px;
}
</style>
</head>
<body>

<div id="terminal"></div>

<div id="sonuc">
    😆 Şakalandın!<br><br>
    Hiçbir şey taranmadı.<br>
    Güzel günler!
</div>

<script>
const satirlar = [
"[+] Güvenli bağlantı kuruldu...",
"[+] Sistem bilgileri kontrol ediliyor...",
"[+] Analiz başlatıldı...",
"[#####-----] %50",
"[#######---] %70",
"[#########-] %90",
"[##########] %100",
"[+] Sonuç hazırlanıyor..."
];

const terminal = document.getElementById("terminal");

let i = 0;

function yaz() {
    if(i < satirlar.length){
        terminal.innerHTML += satirlar[i] + "<br>";
        i++;
        setTimeout(yaz, 1000);
    } else {
        setTimeout(() => {
            document.getElementById("terminal").style.display = "none";
            document.getElementById("sonuc").style.display = "block";
        }, 1500);
    }
}

yaz();
</script>

</body>
</html>
